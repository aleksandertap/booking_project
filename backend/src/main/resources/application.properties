spring.application.name=backend

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:booking}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USER:appuser}
spring.datasource.password=${DB_PASSWORD:apppassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true